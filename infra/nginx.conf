# ──────────────────────────────────────────────────────────────────────────
# Gaffer's Guide — nginx reverse-proxy reference config
#
# With chunked uploads each request carries a single 10 MB chunk, so
# client_max_body_size only needs to cover that — not the entire 8 GB video.
# ──────────────────────────────────────────────────────────────────────────

upstream backend {
    server 127.0.0.1:8000;
}

upstream frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name your-domain.com;

    # ── Body-size limit ─────────────────────────────────────────────────
    # Single chunk is 10 MB + FormData overhead; 20 MB is plenty.
    client_max_body_size 20m;

    # ── Proxy timeouts ──────────────────────────────────────────────────
    proxy_connect_timeout 120s;
    proxy_send_timeout    120s;
    proxy_read_timeout    600s;   # pipeline processing can take minutes

    # Disable request buffering so chunks stream to the backend immediately
    proxy_request_buffering off;

    # ── WebSocket: job progress ─────────────────────────────────────────
    location /ws/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # 1 hour — long-running pipelines
    }

    # ── API backend (FastAPI) ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Health check ────────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
    }

    # ── Frontend (Next.js) ──────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
