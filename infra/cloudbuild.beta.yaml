# Cloud Build for secondary beta pipeline deployment.
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_IMAGE_NAME}:latest"
      - "-f"
      - "backend/Dockerfile"
      - "."
    id: "build-beta-backend"

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA"]
    id: "push-beta-backend"
    waitFor: ["build-beta-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "gcr.io/$PROJECT_ID/${_IMAGE_NAME}:$COMMIT_SHA"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "2Gi"
      - "--cpu"
      - "2"
      - "--timeout"
      - "900"
      - "--concurrency"
      - "8"
      - "--max-instances"
      - "1"
      - "--set-env-vars"
      - "PIPELINE_MODE=beta"
    id: "deploy-beta-backend"
    waitFor: ["push-beta-backend"]

substitutions:
  _REGION: "us-central1"
  _SERVICE_NAME: "gaffers-guide-api-beta"
  _IMAGE_NAME: "gaffers-guide-api-beta"

options:
  logging: CLOUD_LOGGING_ONLY
