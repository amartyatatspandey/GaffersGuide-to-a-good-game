version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - USE_PARALLEL=true
      - FRAME_STEP=3
      - MAX_WORKERS=2
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/output:/app/backend/output

  frontend:
    build:
      context: ./frontend_final
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    depends_on:
      - backend
