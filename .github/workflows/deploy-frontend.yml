name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'frontend_final/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Frontend Image
        run: |
          docker build \
            -f frontend_final/Dockerfile \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaffers-guide-api/gaffers-guide-frontend:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaffers-guide-api/gaffers-guide-frontend:latest \
            --build-arg NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }} \
            --build-arg NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }} \
            frontend_final

          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaffers-guide-api/gaffers-guide-frontend:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaffers-guide-api/gaffers-guide-frontend:latest

      - name: Deploy Frontend
        run: |
          gcloud run deploy gaffers-guide-frontend \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaffers-guide-api/gaffers-guide-frontend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --cpu=1 \
            --memory=2Gi \
            --min-instances=0 \
            --max-instances=3