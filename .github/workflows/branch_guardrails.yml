name: Branch Guardrails

on:
  push:
    branches:
      - main
      - backend-dev
      - frontend-dev
  pull_request:
    branches:
      - main
      - backend-dev
      - frontend-dev

jobs:
  backend-quality:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff backend lint
        run: ruff check backend

      - name: Run backend tests
        run: pytest backend/tests -q

  desktop-quality:
    name: Desktop app quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install desktop dependencies
        working-directory: desktop-app
        run: npm ci

      - name: Typecheck desktop app
        working-directory: desktop-app
        run: npm run typecheck || npm run type-check || npx tsc --noEmit

      - name: Build desktop app (Next.js)
        working-directory: desktop-app
        env:
          NEXT_PUBLIC_BACKEND_URL: "http://127.0.0.1:8000"
        run: npm run build

  integration-smoke:
    name: Integration smoke
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - desktop-quality
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke-test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

      - name: Run integration surface tests
        run: pytest backend/tests/test_integration_surfaces.py backend/tests/test_beta_pipeline_api.py backend/tests/test_job_artifacts_api.py -q
