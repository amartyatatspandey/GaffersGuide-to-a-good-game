<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gaffer's Guide — AI Tactical Coach</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pitch: {
              900: '#0d1117',
              800: '#161b22',
              700: '#21262d',
              600: '#30363d',
              500: '#3d444d',
            },
          },
          animation: {
            'pulse-slow': 'pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(12px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <!-- Plain CSS: Vite PostCSS cannot compile @layer/@apply from CDN-style blocks. -->
  <style>
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    .card-enter { animation: fadeIn 0.4s ease-out forwards; }
    .severity-critical {
      background-color: rgb(69 10 10 / 0.85);
      border-color: rgb(185 28 28);
      color: rgb(252 165 165);
    }
    .severity-high {
      background-color: rgb(67 20 7 / 0.85);
      border-color: rgb(194 65 12);
      color: rgb(253 186 116);
    }
    .severity-medium {
      background-color: rgb(66 32 6 / 0.85);
      border-color: rgb(161 98 7);
      color: rgb(253 224 71);
    }
    .severity-low {
      background-color: rgb(23 37 84 / 0.85);
      border-color: rgb(29 78 216);
      color: rgb(147 197 253);
    }
    .skeleton {
      background-color: #21262d;
      border-radius: 0.375rem;
      animation: pulse-slow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>

<body class="h-full bg-pitch-900 text-slate-100 antialiased">

  <!-- ═══════════════════════  HEADER  ═══════════════════════ -->
  <header class="border-b border-pitch-600 bg-pitch-800/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between gap-4">

      <!-- Logo / wordmark -->
      <div class="flex items-center gap-3 select-none">
        <div class="w-9 h-9 rounded-lg bg-emerald-500 flex items-center justify-center shadow-lg shadow-emerald-900/50">
          <!-- pitch icon -->
          <svg viewBox="0 0 24 24" class="w-5 h-5 text-pitch-900 fill-current" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="2" class="opacity-20"/>
            <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
            <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </div>
        <div>
          <h1 class="text-base font-bold tracking-tight leading-tight">Gaffer's Guide</h1>
          <p class="text-xs text-slate-500 leading-tight">AI Tactical Coach · Powered by FC&nbsp;IQ</p>
        </div>
      </div>

      <!-- Status pill -->
      <div id="status-pill" class="hidden items-center gap-2 text-xs font-medium text-slate-400 bg-pitch-700 rounded-full px-3 py-1.5 border border-pitch-600">
        <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500 inline-block"></span>
        <span id="status-label">Idle</span>
      </div>

      <!-- CTA button -->
      <button
        id="analyze-btn"
        class="relative inline-flex items-center gap-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-400 active:scale-95 transition-all duration-150 text-pitch-900 font-bold px-5 py-2.5 text-sm shadow-lg shadow-emerald-900/40 disabled:opacity-50 disabled:cursor-not-allowed disabled:scale-100"
      >
        <!-- Play icon -->
        <svg id="btn-icon-play" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
          <path d="M6.3 2.84A1.5 1.5 0 0 0 4 4.11v11.78a1.5 1.5 0 0 0 2.3 1.27l9.344-5.891a1.5 1.5 0 0 0 0-2.538L6.3 2.84Z"/>
        </svg>
        <!-- Spinner (hidden) -->
        <svg id="btn-icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             class="w-4 h-4 hidden animate-spin">
          <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
        </svg>
        <span id="btn-label">Analyze Match</span>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════  MAIN  ════════════════════════ -->
  <main class="max-w-6xl mx-auto px-6 py-10">

    <!-- Pipeline status bar (hidden until first fetch) -->
    <div id="pipeline-bar" class="hidden mb-8 flex flex-wrap gap-3 text-xs font-medium">
      <span class="text-slate-500 self-center">Pipeline:</span>
      <span id="pipe-rule"  class="px-2.5 py-1 rounded-full bg-pitch-700 border border-pitch-600 text-slate-400">Rule Engine –</span>
      <span id="pipe-rag"   class="px-2.5 py-1 rounded-full bg-pitch-700 border border-pitch-600 text-slate-400">RAG Synth –</span>
      <span id="pipe-llm"   class="px-2.5 py-1 rounded-full bg-pitch-700 border border-pitch-600 text-slate-400">LLM –</span>
      <span id="pipe-ts"    class="ml-auto text-slate-600 self-center italic">–</span>
    </div>

    <!-- ── Hero / empty state ── -->
    <div id="empty-state" class="flex flex-col items-center justify-center py-28 text-center select-none">
      <div class="w-20 h-20 rounded-2xl bg-pitch-800 border border-pitch-600 flex items-center justify-center mb-6 shadow-inner">
        <svg viewBox="0 0 48 48" class="w-10 h-10 text-emerald-500 fill-none stroke-current stroke-[1.5]" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="40" height="32" rx="4"/>
          <line x1="24" y1="8" x2="24" y2="40"/>
          <circle cx="24" cy="24" r="6"/>
          <line x1="4" y1="24" x2="18" y2="24"/>
          <line x1="30" y1="24" x2="44" y2="24"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-200 mb-2">Ready to Read the Game</h2>
      <p class="text-slate-500 max-w-xs text-sm leading-relaxed">
        Hit <strong class="text-emerald-400">Analyze Match</strong> to run the tactical pipeline and get elite-level coaching insights.
      </p>
    </div>

    <!-- ── Skeleton loader (hidden) ── -->
    <div id="skeleton-state" class="hidden grid grid-cols-1 md:grid-cols-2 gap-5">
      <div class="rounded-2xl border border-pitch-600 bg-pitch-800 p-5 space-y-3">
        <div class="skeleton h-4 w-2/5"></div>
        <div class="skeleton h-3 w-3/5"></div>
        <div class="skeleton h-24 w-full mt-2"></div>
        <div class="flex gap-2 mt-3"><div class="skeleton h-6 w-16 rounded-full"></div><div class="skeleton h-6 w-20 rounded-full"></div></div>
      </div>
      <div class="rounded-2xl border border-pitch-600 bg-pitch-800 p-5 space-y-3">
        <div class="skeleton h-4 w-1/3"></div>
        <div class="skeleton h-3 w-2/4"></div>
        <div class="skeleton h-24 w-full mt-2"></div>
        <div class="flex gap-2 mt-3"><div class="skeleton h-6 w-24 rounded-full"></div></div>
      </div>
      <div class="rounded-2xl border border-pitch-600 bg-pitch-800 p-5 space-y-3 md:col-span-2">
        <div class="skeleton h-4 w-1/4"></div>
        <div class="skeleton h-3 w-2/5"></div>
        <div class="skeleton h-20 w-full mt-2"></div>
        <div class="flex gap-2 mt-3"><div class="skeleton h-6 w-16 rounded-full"></div></div>
      </div>
    </div>

    <!-- ── Error banner (hidden) ── -->
    <div id="error-banner" class="hidden flex items-start gap-3 rounded-2xl border border-red-800 bg-red-950/60 px-5 py-4 text-sm text-red-300 mb-8">
      <svg viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-red-400 mt-0.5 shrink-0">
        <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16ZM8.28 7.22a.75.75 0 0 0-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 1 0 1.06 1.06L10 11.06l1.72 1.72a.75.75 0 1 0 1.06-1.06L11.06 10l1.72-1.72a.75.75 0 0 0-1.06-1.06L10 8.94 8.28 7.22Z"/>
      </svg>
      <div>
        <p id="error-title" class="font-semibold text-red-200">Pipeline error</p>
        <p id="error-detail" class="mt-0.5 text-red-400/90"></p>
      </div>
    </div>

    <!-- ── Advice card grid ── -->
    <div id="advice-container" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>

    <!-- ── Footer ── -->
    <footer class="mt-16 text-center text-xs text-slate-700 select-none">
      Gaffer's Guide · Tactical Intelligence Platform
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
