[tool.ruff]
# The "Style Enforcer"
# This tells the AI: "Our max line length is 88 chars. Use double quotes."
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# E = Errors, F = Pyflakes (Logic), I = Imports (Sorting)
select = ["E", "F", "I"]
ignore = []

[tool.pytest.ini_options]
# The "Tester"
# This tells pytest where to find tests and how to run them.
minversion = "6.0"
addopts = "-ra -q"
testpaths = [
    "tests",
]
[tool.ruff]
line-length = 220