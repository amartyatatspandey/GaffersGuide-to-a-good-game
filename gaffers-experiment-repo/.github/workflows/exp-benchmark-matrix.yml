name: Exp Benchmark Matrix

on:
  workflow_dispatch:
  push:
    paths:
      - "experiment-backend/**"
      - "docs/experiment_runbook.md"

jobs:
  nvidia_release_gate:
    # Requires self-hosted GPU runner with label nvidia.
    runs-on: [self-hosted, linux, nvidia]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd experiment-backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run NVIDIA benchmark matrix (blocking)
        run: |
          cd experiment-backend
          python -m scripts.benchmark_decoders ../../backend/data/match_test.mp4 --matrix --trials 5 --runtime-target nvidia --hardware-profile l4 --quality-regression-ok --output-json output/exp/decoder_benchmark_matrix_nvidia.json
      - name: Compare NVIDIA benchmark vs baseline (blocking)
        if: ${{ vars.EXP_BASELINE_BENCHMARK_JSON != '' }}
        run: |
          cd experiment-backend
          python -m scripts.compare_benchmarks --current output/exp/decoder_benchmark_matrix_nvidia.json --baseline "${{ vars.EXP_BASELINE_BENCHMARK_JSON }}" --output-json output/exp/benchmark_delta_report_nvidia.json --min-improvement-pct 0.0
      - name: Upload NVIDIA benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decoder-benchmark-nvidia-artifacts
          path: |
            experiment-backend/output/exp/decoder_benchmark_matrix_nvidia.json
            experiment-backend/output/exp/benchmark_delta_report_nvidia.json
            experiment-backend/output/exp/bench_runs/

  apple_mps_tracked:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd experiment-backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Apple MPS benchmark matrix (non-blocking)
        run: |
          cd experiment-backend
          python -m scripts.benchmark_decoders ../../backend/data/match_test.mp4 --matrix --trials 5 --runtime-target apple_mps --hardware-profile mps --quality-regression-ok --output-json output/exp/decoder_benchmark_matrix_mps.json
      - name: Upload MPS benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: decoder-benchmark-mps-artifacts
          path: |
            experiment-backend/output/exp/decoder_benchmark_matrix_mps.json
            experiment-backend/output/exp/bench_runs/
